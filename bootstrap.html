<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Page</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">My Site</a>

    <div>
      <a class="text-white me-3" href="index.html">Home</a>
      <a class="text-white me-3" href="bootstrap.html">Bootstrap</a>
    </div>
  </div>
</nav>

<!-- PAGE CONTENT -->
<div class="container mt-4">

  <h1 class="mb-4">Bootstrap Interaction Page</h1>

  <!-- BUTTON + MODAL -->
  <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#myModal">
    Open Popup
  </button>

  <div class="modal fade" id="myModal">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Hello!</h5>
        </div>

        <div class="modal-body">
          This is a Bootstrap modal popup.
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>

      </div>
    </div>
  </div>

  <!-- FORM -->
  <div class="mt-4">
    <h3>Contact Form</h3>

    <form>
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" placeholder="Enter your name">
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="Enter your email">
      </div>

      <div class="mb-3">
        <label class="form-label">Message</label>
        <textarea class="form-control" rows="3"></textarea>
      </div>

      <button type="submit" class="btn btn-success">Submit</button>
    </form>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
